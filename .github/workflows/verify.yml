name: Verify

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first: the TanStack Start vite plugin generates apps/web/src/routeTree.gen.ts
      # (gitignored) during build, and `pnpm typecheck` needs it — a bare checkout has no
      # route tree, so verify-before-build would fail typecheck on a clean CI runner. This
      # also guards the deploy path: deploy.yml runs `turbo run build` before every
      # `wrangler deploy`, so a green PR here can't break the deploy on merge.
      - run: pnpm build
        env:
          CI: "1"

      # typecheck · lint · format · test — the same gate `pnpm verify` runs locally.
      - run: pnpm verify
