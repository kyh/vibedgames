<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Bomberman</title>
    <style>
      :root { --ink: #eef2ff; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0e1020; color: var(--ink); font-family: system-ui, -apple-system, sans-serif; }
      #game { position: fixed; inset: 0; }
      #game canvas { display: block; }

      #hud { position: fixed; inset: 0; pointer-events: none; padding: 14px; display: flex; flex-direction: column; }
      .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
      .pill {
        background: rgba(10, 12, 28, 0.62);
        border: 1px solid rgba(120, 140, 220, 0.22);
        padding: 7px 12px; border-radius: 10px;
        font: 13px/1.3 ui-monospace, "SF Mono", Menlo, monospace;
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 4px 18px rgba(0,0,0,0.3);
      }
      #players { text-align: right; }
      #stats {
        align-self: center; margin-top: auto; margin-bottom: 6px;
        font-size: 18px; letter-spacing: 2px; padding: 8px 16px;
      }
      #stats:empty { display: none; }

      #banner {
        position: fixed; top: 38%; left: 0; right: 0; text-align: center;
        font: 800 clamp(34px, 7vw, 76px)/1 system-ui, sans-serif;
        color: #fff; text-shadow: 0 4px 0 rgba(0,0,0,0.35), 0 0 28px rgba(120,150,255,0.6);
        opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div class="row">
        <div class="pill" id="status">Connecting…</div>
        <div class="pill" id="players"></div>
      </div>
      <div class="pill" id="stats"></div>
    </div>
    <div id="banner"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
