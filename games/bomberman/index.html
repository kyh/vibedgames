<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Bomberman</title>
    <meta
      name="description"
      content="Drop bombs, snag power-ups, trap your rivals. Last one standing wins."
    />
    <style>
      :root {
        --ink: #eef2ff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0e1020;
        color: var(--ink);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      #game canvas {
        display: block;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        /* Keep edge-anchored pills clear of the notch / home indicator. */
        padding: calc(14px + env(safe-area-inset-top, 0px))
          calc(14px + env(safe-area-inset-right, 0px)) calc(14px + env(safe-area-inset-bottom, 0px))
          calc(14px + env(safe-area-inset-left, 0px));
        display: flex;
        flex-direction: column;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .pill {
        background: rgba(10, 12, 28, 0.62);
        border: 1px solid rgba(120, 140, 220, 0.22);
        padding: 7px 12px;
        border-radius: 10px;
        font:
          13px/1.3 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
      }
      #players {
        text-align: right;
      }
      #stats {
        align-self: center;
        margin-top: auto;
        margin-bottom: 6px;
        font-size: 18px;
        letter-spacing: 2px;
        padding: 8px 16px;
      }
      #stats:empty {
        display: none;
      }

      #banner {
        position: fixed;
        top: 38%;
        left: 0;
        right: 0;
        text-align: center;
        font:
          800 clamp(34px, 7vw, 76px)/1 system-ui,
          sans-serif;
        color: #fff;
        text-shadow:
          0 4px 0 rgba(0, 0, 0, 0.35),
          0 0 28px rgba(120, 150, 255, 0.6);
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }

      /* Initial screen. The only place controls are taught — once play starts
         the field carries no instruction text. Removed from the DOM on start. */
      #start {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        text-align: center;
        padding: 24px;
        background: rgba(8, 10, 24, 0.82);
        backdrop-filter: blur(7px);
        -webkit-backdrop-filter: blur(7px);
        z-index: 10;
        transition: opacity 0.28s ease;
      }
      #start.hide {
        opacity: 0;
        pointer-events: none;
      }
      #start h1 {
        margin: 0;
        font:
          800 clamp(38px, 8vw, 84px)/1 system-ui,
          sans-serif;
        color: #fff;
        letter-spacing: 2px;
        text-shadow:
          0 4px 0 rgba(0, 0, 0, 0.35),
          0 0 28px rgba(120, 150, 255, 0.6);
      }
      #start-controls {
        max-width: 30ch;
        color: #cbd3f0;
        line-height: 1.9;
        white-space: pre-line;
        font:
          14px/1.9 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
      }
      #start-go {
        color: #8ea2ff;
        font:
          600 14px/1 ui-monospace,
          monospace;
        letter-spacing: 1px;
        animation: start-pulse 1.6s ease-in-out infinite;
      }
      @keyframes start-pulse {
        50% {
          opacity: 0.35;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #start-go {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div class="row">
        <div class="pill" id="status">Connecting…</div>
        <div class="pill" id="players"></div>
      </div>
      <div class="pill" id="stats"></div>
    </div>
    <div id="banner"></div>
    <div id="start">
      <h1>BOMBERMAN</h1>
      <div id="start-controls"></div>
      <div id="start-go"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
