<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Lunerfall</title>
    <meta
      name="description"
      content="TowerFall-feel roguelite. Five heroes, five biomes, online co-op and versus duels."
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #05070b;
        color: #f4f7fb;
        font-family: "Courier New", monospace;
        cursor: default;
      }
      #game {
        position: fixed;
        inset: 0;
        touch-action: none;
      }
      #game canvas {
        display: block;
      }
      /* Landscape-native game: on portrait phones, ask for a rotation instead
         of squeezing the arena. Pure CSS, so it tracks rotation instantly. */
      #rotate {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        text-align: center;
        background: #05070b;
        color: #34e5c8;
        letter-spacing: 0.12em;
      }
      #rotate .glyph {
        font-size: 44px;
        animation: rotate-nudge 1.6s ease-in-out infinite;
      }
      #rotate .sub {
        color: #8b95a1;
        font-size: 12px;
      }
      @keyframes rotate-nudge {
        0%,
        55%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-90deg);
        }
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate">
      <div class="glyph">📱</div>
      <div>ROTATE YOUR PHONE</div>
      <div class="sub">Lunerfall duels in landscape</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
