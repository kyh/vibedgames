<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <title>Crazy Waymo</title>
    <meta
      name="description"
      content="A runaway robotaxi loose on real San Francisco streets. Pick up fares, catch air, get paid."
    />
    <style>
      * {
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #14111a;
        color: #fff;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        touch-action: none;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      #game canvas {
        display: block;
      }

      /* ---- HUD ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        font-weight: 700;
      }
      .pill {
        position: fixed;
        background: rgba(18, 16, 26, 0.62);
        border: 2px solid rgba(255, 209, 71, 0.5);
        border-radius: 12px;
        padding: 8px 14px;
        letter-spacing: 1px;
        backdrop-filter: blur(7px);
        -webkit-backdrop-filter: blur(7px);
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.35);
      }
      .label {
        font-size: 10px;
        letter-spacing: 2px;
        opacity: 0.7;
        display: block;
      }
      .value {
        font-size: 22px;
        font-variant-numeric: tabular-nums;
      }

      /* Current area — persistent, top-center */
      #area {
        top: calc(14px + env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 16px;
        font-size: 12px;
        letter-spacing: 2px;
        color: #ffd147;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.3s;
      }
      #area.show {
        opacity: 1;
      }

      /* Timer — big, top-center */
      #timer {
        top: calc(14px + env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        border-color: rgba(255, 209, 71, 0.85);
        padding: 6px 22px;
      }
      #timer .value {
        font-size: 46px;
        color: #ffd147;
        text-shadow: 0 3px 0 rgba(0, 0, 0, 0.5);
        line-height: 1;
      }
      #timer.low .value {
        color: #ff5a52;
      }
      #timer.low {
        animation: heartbeat 1s ease-in-out infinite;
      }
      @keyframes heartbeat {
        0%,
        60%,
        100% {
          transform: translateX(-50%) scale(1);
        }
        30% {
          transform: translateX(-50%) scale(1.07);
        }
      }

      /* Combo chain meter — under the timer */
      #combo-meter {
        position: fixed;
        top: calc(84px + env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        text-align: center;
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
      }
      #combo-meter.show {
        opacity: 1;
      }
      #combo-meter .mult {
        font-size: 18px;
        font-weight: 900;
        font-style: italic;
        color: #ffd147;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.5);
      }
      #combo-track {
        height: 5px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.18);
        overflow: hidden;
        margin-top: 3px;
      }
      #combo-fill {
        height: 100%;
        width: 100%;
        background: #ffd147;
      }
      #combo-meter.urgent #combo-fill {
        background: #ff5a52;
      }
      #district {
        position: fixed;
        top: calc(120px + env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        font:
          800 italic 22px/1 system-ui,
          sans-serif;
        letter-spacing: 1px;
        color: #fff;
        white-space: nowrap;
        text-shadow:
          0 2px 0 rgba(0, 0, 0, 0.5),
          0 0 18px rgba(255, 209, 71, 0.45);
        opacity: 0;
        pointer-events: none;
      }
      #time-bonus {
        position: fixed;
        top: calc(78px + env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        font-size: 30px;
        color: #6bff8e;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.5);
        opacity: 0;
        pointer-events: none;
        font-weight: 800;
      }

      /* Score — top-left */
      #score {
        top: calc(14px + env(safe-area-inset-top));
        left: calc(14px + env(safe-area-inset-left));
      }
      #score .value {
        color: #fff;
      }
      #boost-track {
        width: 84px;
        height: 8px;
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.16);
        overflow: hidden;
        margin-top: 4px;
      }
      #boost-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ffd147, #ff8a3c);
        transition: width 0.1s linear;
      }
      #speed.denied {
        animation: denyshake 0.16s linear 2;
      }
      #speed.denied #boost-fill {
        background: #ff5a52;
      }
      @keyframes denyshake {
        25% {
          transform: translateX(-3px);
        }
        75% {
          transform: translateX(3px);
        }
      }

      /* Mini dash — speedo dial (digits in the middle) + boost, bottom-left */
      #speed {
        left: calc(14px + env(safe-area-inset-left));
        bottom: calc(14px + env(safe-area-inset-bottom));
        padding: 7px 10px 7px;
        text-align: center;
      }
      #dash-dial {
        display: block;
        width: 88px;
        height: 52px;
        margin: 0 auto;
      }
      #speed #boost-track {
        margin: 4px auto 0;
      }

      /* Fare card — top-right, only while carrying a passenger */
      #fare-card {
        top: calc(40px + env(safe-area-inset-top));
        right: calc(14px + env(safe-area-inset-right));
        min-width: 150px;
        text-align: right;
        border-color: rgba(73, 224, 255, 0.55);
        transition:
          opacity 0.2s,
          transform 0.2s;
        opacity: 0;
        transform: translateX(20px);
      }
      #fare-card.show {
        opacity: 1;
        transform: translateX(0);
      }
      #fare-card .who {
        font-size: 13px;
        color: #49e0ff;
      }
      #fare-card .dist {
        font-size: 22px;
        font-variant-numeric: tabular-nums;
        color: #fff;
      }
      #patience-track {
        height: 5px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.16);
        overflow: hidden;
        margin-top: 6px;
      }
      #patience-fill {
        height: 100%;
        width: 100%;
        background: #6bff8e;
      }

      /* Combo — center-ish, punchy */
      #combo {
        position: fixed;
        top: 30%;
        left: 50%;
        transform: translate(-50%, 0) scale(0.6);
        font-size: clamp(26px, 6vw, 60px);
        font-weight: 900;
        font-style: italic;
        color: #ffd147;
        text-shadow:
          0 0 18px rgba(255, 160, 40, 0.8),
          0 4px 0 rgba(0, 0, 0, 0.5);
        opacity: 0;
        pointer-events: none;
        letter-spacing: 1px;
      }

      /* Minor announcements (near-miss, smash, air) — below the major slot */
      #announce-minor {
        position: fixed;
        top: 42%;
        left: 50%;
        transform: translate(-50%, 0);
        font-size: clamp(16px, 3.2vw, 30px);
        font-weight: 800;
        font-style: italic;
        color: #aee3ff;
        text-shadow:
          0 0 12px rgba(80, 180, 255, 0.6),
          0 3px 0 rgba(0, 0, 0, 0.5);
        opacity: 0;
        pointer-events: none;
        letter-spacing: 1px;
      }

      /* Itemized dropoff receipt */
      #receipt {
        position: fixed;
        top: 34%;
        right: 12%;
        text-align: right;
        pointer-events: none;
      }
      #receipt div {
        font-size: clamp(16px, 3vw, 28px);
        font-weight: 900;
        font-style: italic;
        letter-spacing: 1px;
        text-shadow: 0 3px 0 rgba(0, 0, 0, 0.5);
        margin-top: 2px;
      }

      /* Speed vignette */
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 3;
        opacity: 0;
        background: radial-gradient(ellipse at center, transparent 55%, rgba(8, 6, 14, 0.55) 100%);
      }

      /* Countdown 3-2-1-GO */
      #countdown {
        position: fixed;
        top: 34%;
        left: 50%;
        transform: translate(-50%, -50%);
        font:
          900 italic clamp(70px, 16vw, 170px) / 1 system-ui,
          sans-serif;
        color: #ffd147;
        text-shadow:
          0 8px 0 rgba(0, 0, 0, 0.45),
          0 0 50px rgba(255, 160, 40, 0.6);
        opacity: 0;
        pointer-events: none;
      }

      /* Minimap — north-up SF, flush with the bottom-right corner */
      #minimap {
        position: fixed;
        right: calc(14px + env(safe-area-inset-right));
        bottom: calc(14px + env(safe-area-inset-bottom));
        width: 148px;
        height: 148px;
        border-radius: 12px;
        border: 2px solid rgba(255, 209, 71, 0.5);
        background: rgba(18, 16, 26, 0.62);
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.35);
        display: none;
        z-index: 5;
        pointer-events: none;
        opacity: 0.92;
      }
      /* Touch: the pedals own the bottom-right, so the map stacks directly on
         top of the speedo in the bottom-left column. `bottom` clears the
         speedo's ~84px box plus a 10px gutter. */
      @media (pointer: coarse) {
        #minimap {
          width: 104px;
          height: 104px;
          right: auto;
          top: auto;
          left: calc(14px + env(safe-area-inset-left));
          bottom: calc(108px + env(safe-area-inset-bottom));
        }
      }
      @media (pointer: coarse) and (max-height: 500px) {
        #minimap {
          width: 96px;
          height: 96px;
        }
      }
      /* Mouse on a narrow window: no pedals, so keep it out of the HUD column. */
      @media (max-width: 720px) and (pointer: fine) {
        #minimap {
          width: 104px;
          height: 104px;
          right: auto;
          bottom: auto;
          left: calc(12px + env(safe-area-inset-left));
          top: calc(170px + env(safe-area-inset-top));
        }
      }

      /* Destination off-screen arrow */
      #dest-arrow {
        position: fixed;
        left: 0;
        top: 0;
        width: 64px;
        height: 64px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        will-change: transform;
      }
      #dest-arrow svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.6));
      }

      /* Center banner: title / game over */
      #banner {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
        background: radial-gradient(
          circle at 50% 40%,
          rgba(20, 16, 28, 0.35),
          rgba(10, 8, 14, 0.78)
        );
      }
      #banner.show {
        opacity: 1;
      }
      #banner-title {
        font:
          900 clamp(44px, 11vw, 120px) / 0.95 system-ui,
          sans-serif;
        font-style: italic;
        color: #ffd147;
        letter-spacing: -2px;
        text-shadow:
          0 6px 0 rgba(0, 0, 0, 0.45),
          0 0 40px rgba(255, 160, 40, 0.5);
        transform: rotate(-3deg);
      }
      #banner-sub {
        margin-top: 18px;
        font-size: clamp(15px, 3.4vw, 22px);
        color: #fff;
        max-width: 80vw;
        line-height: 1.5;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.5);
      }
      #banner-stats {
        margin-top: 10px;
        font-size: clamp(13px, 2.6vw, 17px);
        color: #aee3ff;
        font-variant-numeric: tabular-nums;
      }
      #banner-cta {
        margin-top: 26px;
        font-size: 15px;
        letter-spacing: 2px;
        color: #14111a;
        background: #ffd147;
        border-radius: 10px;
        padding: 12px 22px;
        pointer-events: auto;
        cursor: pointer;
        box-shadow: 0 5px 0 rgba(0, 0, 0, 0.4);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        50% {
          transform: scale(1.05);
        }
      }

      /* Screen flash overlay */
      #flash {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        z-index: 4;
        mix-blend-mode: screen;
      }

      /* Loading */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #14111a;
        z-index: 20;
        gap: 16px;
      }
      #loading .lt {
        font:
          900 italic clamp(34px, 9vw, 80px) / 1 system-ui,
          sans-serif;
        color: #ffd147;
        transform: rotate(-3deg);
        letter-spacing: -2px;
      }
      #bar {
        width: min(60vw, 320px);
        height: 10px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      #bar-fill {
        height: 100%;
        width: 0%;
        background: #ffd147;
        transition: width 0.2s;
      }
      #loading .ls {
        font-size: 12px;
        letter-spacing: 2px;
        opacity: 0.6;
      }

      /* Touch controls */
      #touch {
        position: fixed;
        inset: 0;
        z-index: 6;
        pointer-events: none;
        display: none;
      }
      /* Both must hold: .on = touch device, .play = active run — the buttons
         never float over the title/gameover banner. */
      #touch.on.play {
        display: block;
      }
      .tbtn {
        position: fixed;
        pointer-events: auto;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        color: #fff;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .tbtn:active {
        background: rgba(255, 209, 71, 0.4);
      }

      /* Pedals: tall rounded slabs with a tread face. Both sit on the same
         bottom edge as the speedo across from them. */
      .pedal {
        position: fixed;
        pointer-events: auto;
        bottom: calc(14px + env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        padding: 10px 0 9px;
        border-radius: 14px / 18px;
        border: 2px solid;
        box-shadow:
          0 5px 0 rgba(0, 0, 0, 0.45),
          inset 0 8px 18px rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        transition:
          transform 0.06s ease,
          box-shadow 0.06s ease;
      }
      /* Press = the pedal travels down onto its shadow. */
      .pedal:active {
        transform: translateY(4px);
        box-shadow:
          0 1px 0 rgba(0, 0, 0, 0.45),
          inset 0 8px 18px rgba(255, 255, 255, 0.12);
      }
      .pedal .tread {
        flex: 1;
        width: 62%;
        border-radius: 4px;
        /* ridged rubber face */
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.4) 0 2px,
          transparent 2px 8px
        );
      }
      .pedal .cap {
        font:
          700 11px/1 ui-monospace,
          monospace;
        letter-spacing: 1.5px;
        color: #fff;
      }
      /* The only pedal — touch drives itself while a finger is down. */
      #t-brake {
        right: calc(14px + env(safe-area-inset-right));
        width: 96px;
        height: 132px;
        background: rgba(255, 90, 82, 0.15);
        border-color: rgba(255, 90, 82, 0.55);
      }

      /* NOS: a small red nitro button riding above the gas pedal. */
      #t-boost {
        right: calc(30px + env(safe-area-inset-right));
        bottom: calc(158px + env(safe-area-inset-bottom));
        width: 64px;
        height: 64px;
        flex-direction: column;
        gap: 1px;
        background: radial-gradient(
          circle at 50% 34%,
          rgba(255, 90, 82, 0.55),
          rgba(150, 20, 16, 0.6)
        );
        border-color: rgba(255, 90, 82, 0.85);
        box-shadow:
          0 4px 0 rgba(0, 0, 0, 0.42),
          0 0 16px rgba(255, 90, 82, 0.45);
      }
      #t-boost .nos {
        font-size: 26px;
        line-height: 1;
      }
      #t-boost:active {
        transform: translateY(3px);
        background: radial-gradient(circle at 50% 34%, #ff8a80, rgba(200, 30, 24, 0.85));
      }
      /* Chat: a frameless glyph tucked under the EARNED pill, its left edge
         aligned with the pill's. The 44px box stays as the touch target. */
      #t-chat {
        left: calc(14px + env(safe-area-inset-left));
        top: calc(76px + env(safe-area-inset-top));
        width: 44px;
        height: 44px;
        font-size: 22px;
        background: none;
        border: none;
        justify-content: flex-start;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
      }
      #t-chat:active {
        background: none;
        transform: scale(0.92);
        opacity: 0.85;
      }
      /* Narrow phones: shrink the pedal, keep the shared bottom edge. */
      @media (max-width: 420px) {
        #t-brake {
          right: calc(12px + env(safe-area-inset-right));
          width: 82px;
          height: 116px;
        }
        #t-boost {
          right: calc(20px + env(safe-area-inset-right));
          bottom: calc(142px + env(safe-area-inset-bottom));
          width: 56px;
          height: 56px;
        }
      }
      /* Landscape phones: short viewport — a shorter pedal so NOS still clears
         its top edge. Steering is the floating stick, so the left half stays
         free for the map/speedo column. */
      @media (max-height: 500px) {
        #t-brake {
          height: 112px;
        }
        #t-boost {
          bottom: calc(138px + env(safe-area-inset-bottom));
          width: 56px;
          height: 56px;
        }
      }

      @media (max-width: 720px) {
        #timer .value {
          font-size: 34px;
        }
        #combo-meter {
          top: 64px;
        }
        #district {
          top: 132px;
        }
        #receipt {
          top: 40%;
          right: 6%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #banner-cta {
          animation: none;
        }
        #timer.low {
          animation: none;
        }
      }
      /* Landing screen: the banner is the whole screen. Hide every gameplay
         surface behind it — HUD pills, minimap, driver count, touch pad. */
      body.landing #hud,
      body.landing #netinfo,
      body.landing #touch {
        display: none;
      }
      /* Keycap legend, below the CTA. Chips read as keys, not prose. */
      #banner-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 12px 18px;
        margin-top: 30px;
        max-width: min(680px, 92vw);
      }
      #banner-controls:empty {
        display: none;
      }
      #banner-controls .hint {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }
      #banner-controls kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 26px;
        height: 26px;
        padding: 0 7px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-bottom-width: 2px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font:
          700 12px/1 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
      }
      #banner-controls .lbl {
        font:
          600 12px/1 system-ui,
          sans-serif;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.62);
      }

      /* Online-drivers count — top-right corner. */
      #netinfo {
        position: fixed;
        top: calc(18px + env(safe-area-inset-top));
        right: calc(14px + env(safe-area-inset-right));
        text-align: right;
        z-index: 5;
        pointer-events: none;
        font:
          12px/1.2 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        letter-spacing: 2px;
        color: #fff;
        opacity: 0.7;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
      }
      #netinfo:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <style>
      #garage {
        display: none;
        position: fixed;
        left: 50%;
        bottom: 120px;
        transform: translateX(-50%);
        z-index: 28;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        background: rgba(10, 14, 24, 0.92);
        border: 2px solid rgba(255, 210, 74, 0.5);
        border-radius: 18px;
        padding: 16px 18px;
        pointer-events: auto;
      }
      #garage .gtitle {
        font:
          800 15px ui-monospace,
          monospace;
        color: #ffd24a;
        letter-spacing: 1px;
      }
      #garage .gcards {
        display: flex;
        gap: 10px;
      }
      #garage .gcard {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        width: 118px;
        padding: 10px 8px;
        border-radius: 12px;
        border: 2px solid rgba(255, 255, 255, 0.18);
        background: rgba(24, 30, 48, 0.9);
        color: #fff;
        cursor: pointer;
        font:
          600 11px ui-monospace,
          monospace;
      }
      #garage .gcard i {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }
      #garage .gcard b {
        font-size: 12px;
      }
      #garage .gcard small {
        opacity: 0.55;
        font-size: 9px;
        text-align: center;
      }
      #garage .gcard span {
        font-weight: 800;
        color: #9fe697;
      }
      #garage .gcard:not(.owned):not(.on) span {
        color: #ffd24a;
      }
      #garage .gcard.on {
        border-color: #ffd24a;
        background: rgba(64, 54, 20, 0.9);
      }
      #garage .gcard.on span {
        color: #ffd24a;
      }
      #garage .gcard:hover {
        border-color: #fff;
      }
      #garage .ghint {
        font:
          600 10px ui-monospace,
          monospace;
        opacity: 0.5;
      }
    </style>
    <input
      id="chat"
      maxlength="90"
      placeholder="say something…"
      autocomplete="off"
      style="
        display: none;
        position: fixed;
        left: 50%;
        bottom: 88px;
        transform: translateX(-50%);
        z-index: 30;
        width: min(480px, 80vw);
        padding: 10px 16px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.45);
        background: rgba(10, 14, 24, 0.88);
        color: #fff;
        font:
          600 14px ui-monospace,
          monospace;
        outline: none;
        pointer-events: auto;
      "
    />
    <div id="netinfo"></div>
    <div id="hud">
      <div class="pill" id="timer">
        <span class="label">TIME</span><span class="value">60</span>
      </div>
      <div id="combo-meter">
        <span class="mult"></span>
        <div id="combo-track"><div id="combo-fill"></div></div>
      </div>
      <div id="time-bonus"></div>
      <div class="pill" id="area"></div>
      <div id="district"></div>
      <div class="pill" id="score">
        <span class="label">EARNED</span><span class="value">0</span>
      </div>
      <div class="pill" id="speed">
        <canvas id="dash-dial" aria-hidden="true"></canvas>
        <div id="boost-track"><div id="boost-fill"></div></div>
      </div>
      <div class="pill" id="fare-card">
        <span class="who"></span>
        <div class="dist"></div>
        <div id="patience-track"><div id="patience-fill"></div></div>
      </div>
      <div id="combo"></div>
      <div id="announce-minor"></div>
      <div id="receipt"></div>
      <div id="countdown"></div>
      <canvas id="minimap" aria-hidden="true"></canvas>
      <div id="dest-arrow">
        <svg viewBox="0 0 64 64">
          <polygon
            points="32,4 56,40 32,30 8,40"
            fill="#6bff8e"
            stroke="#0c2414"
            stroke-width="3"
            stroke-linejoin="round"
          />
        </svg>
      </div>
    </div>

    <div id="banner" data-gamepad-ignore>
      <div id="banner-title">CRAZY WAYMO</div>
      <div id="banner-sub"></div>
      <div id="banner-stats"></div>
      <div id="banner-cta" role="button" tabindex="0" aria-label="Start driving">START DRIVING</div>
      <div id="banner-controls"></div>
    </div>

    <div id="flash"></div>
    <div id="vignette"></div>

    <!-- data-gamepad-ignore: taps here must not anchor the steering stick. -->
    <div id="touch" aria-hidden="true" data-gamepad-ignore>
      <div class="pedal" id="t-brake" role="button" aria-label="Brake and reverse">
        <span class="tread"></span><span class="cap">BRAKE</span>
      </div>
      <div class="tbtn" id="t-boost" role="button" aria-label="Nitro boost">
        <span class="nos">🔥</span>
      </div>
      <div class="tbtn" id="t-chat" role="button" aria-label="Chat">💬</div>
    </div>

    <div id="loading">
      <div class="lt">CRAZY WAYMO</div>
      <div id="bar"><div id="bar-fill"></div></div>
      <div class="ls">REVVING ENGINES…</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
