<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <title>Pacman</title>
    <meta
      name="description"
      content="Chomp pellets and outsmart ghosts in a soft plush-clinic maze."
    />
    <style>
      :root {
        --cream: #fdf1e6;
        --ink: #6b5e66;
        --ink-soft: #9d8e96;
        --butter: #f5b942;
        --blush: #f27e9d;
        --card: rgba(255, 255, 255, 0.78);
        --card-edge: rgba(242, 126, 157, 0.25);
        --round-font:
          ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN", Quicksand, Varela Round,
          system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--cream);
        color: var(--ink);
        font-family: var(--round-font);
      }
      #game {
        position: fixed;
        inset: 0;
        touch-action: none;
      }
      #game canvas {
        display: block;
      }

      /* Soft pink blink when caught — feedback, not punishment. */
      #flash {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: #f8a8bd;
        opacity: 0;
      }
      #flash.on {
        animation: flash-fade 350ms ease-out forwards;
      }
      @keyframes flash-fade {
        from {
          opacity: 0.4;
        }
        to {
          opacity: 0;
        }
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        padding: calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right))
          calc(16px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
        display: flex;
        flex-direction: column;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .pill {
        background: var(--card);
        border: 1.5px solid var(--card-edge);
        padding: 8px 16px;
        border-radius: 999px;
        font: 700 14px/1.3 var(--round-font);
        letter-spacing: 0.04em;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 6px 20px rgba(212, 150, 167, 0.25);
      }
      #score {
        color: var(--butter);
      }
      #best {
        color: var(--ink-soft);
      }
      #stats {
        align-self: center;
        margin-top: auto;
        margin-bottom: 8px;
        font-size: 17px;
        letter-spacing: 2px;
        padding: 9px 20px;
        color: var(--blush);
      }
      #stats:empty {
        display: none;
      }
      /* Touch layouts: the bottom strip belongs to the webcam + control pills,
         so lives/pellets dock under the score row instead. */
      body.touch #stats {
        margin-top: 10px;
        margin-bottom: 0;
      }

      /* Tappable HUD pills — selfie cam + restart, the touch stand-ins for
         SHIFT and R. >=44px targets. */
      #controls {
        position: fixed;
        left: calc(12px + env(safe-area-inset-left));
        bottom: calc(12px + env(safe-area-inset-bottom));
        z-index: 11;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .ctl {
        width: 48px;
        height: 48px;
        padding: 0;
        border-radius: 999px;
        background: var(--card);
        border: 1.5px solid var(--card-edge);
        box-shadow: 0 6px 20px rgba(212, 150, 167, 0.25);
        font: 700 20px/1 var(--round-font);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .ctl.on {
        background: var(--butter);
        border-color: rgba(245, 185, 66, 0.6);
      }
      #btn-selfie,
      #btn-restart {
        display: none;
      }
      body.touch #btn-selfie,
      body.touch #btn-restart {
        display: flex;
      }

      #banner {
        position: fixed;
        top: 34%;
        left: 0;
        right: 0;
        text-align: center;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }
      #banner.pop {
        animation: banner-pop 450ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes banner-pop {
        from {
          transform: scale(0.72);
        }
        to {
          transform: scale(1);
        }
      }
      #banner-title {
        font: 800 clamp(38px, 7.5vw, 80px)/1.1 var(--round-font);
        letter-spacing: 0.02em;
        color: var(--butter);
        text-shadow:
          0 3px 0 rgba(255, 255, 255, 0.9),
          0 10px 28px rgba(212, 150, 167, 0.45);
      }
      #banner-sub {
        margin: 14px auto 0;
        max-width: 620px;
        padding: 10px 22px;
        display: inline-block;
        background: var(--card);
        border: 1.5px solid var(--card-edge);
        border-radius: 18px;
        font: 600 clamp(13px, 2vw, 16px)/1.5 var(--round-font);
        color: var(--ink);
        box-shadow: 0 6px 20px rgba(212, 150, 167, 0.25);
      }
      #banner-sub:empty {
        display: none;
      }

      /* Webcam preview — the face IS the controller, so frame it like a
         friendly little porthole. Legacy size kept: 192x144, 384x288 on
         desktop (pointer: fine — a landscape PHONE also matches min-width,
         and 288px would swallow the screen). Tap collapses it to a pill. */
      #webcam {
        position: fixed;
        right: calc(12px + env(safe-area-inset-right));
        bottom: calc(12px + env(safe-area-inset-bottom));
        z-index: 10;
        width: 192px;
        height: 144px;
        border-radius: 22px;
        background: var(--card);
        border: 3px solid rgba(255, 255, 255, 0.95);
        box-shadow: 0 10px 30px rgba(212, 150, 167, 0.4);
        overflow: hidden;
        cursor: pointer;
        transition:
          width 0.2s ease,
          height 0.2s ease;
      }
      #webcam video {
        display: block;
        width: 100%;
        height: auto;
      }
      #webcam canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #webcam-status {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 12px;
        font: 600 11px/1.5 var(--round-font);
        color: var(--ink-soft);
        pointer-events: none;
      }
      @media (min-width: 768px) and (pointer: fine) {
        #webcam {
          width: 384px;
          height: 288px;
        }
      }
      /* Phone landscape: even the small porthole is a third of the height. */
      @media (pointer: coarse) and (max-height: 520px) {
        #webcam {
          width: 144px;
          height: 108px;
        }
      }
      #webcam.collapsed {
        width: 56px;
        height: 44px;
      }
      #webcam.collapsed video,
      #webcam.collapsed canvas,
      #webcam.collapsed #webcam-status {
        display: none;
      }
      #webcam-cue {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        pointer-events: none;
      }
      #webcam.collapsed #webcam-cue {
        display: flex;
      }
      #netinfo {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        font:
          11px/1.2 ui-monospace,
          Menlo,
          monospace;
        letter-spacing: 2px;
        color: #fff;
        opacity: 0.7;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      }
      #netinfo:empty {
        display: none;
      }
      #board {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        left: calc(12px + env(safe-area-inset-left));
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font:
          12px/1.25 ui-monospace,
          Menlo,
          monospace;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        letter-spacing: 1px;
      }
      #board .row {
        display: flex;
        gap: 10px;
        align-items: baseline;
        background: rgba(20, 12, 30, 0.5);
        border-radius: 8px;
        padding: 3px 9px;
      }
      #board .row.me {
        outline: 1px solid rgba(255, 255, 255, 0.5);
      }
      #board .sc {
        margin-left: auto;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="flash"></div>
    <div id="netinfo"></div>
    <div id="board"></div>
    <div id="hud">
      <div class="row">
        <div class="pill" id="score">SCORE 0</div>
        <div class="pill" id="best">BEST 0</div>
      </div>
      <div class="pill" id="stats"></div>
    </div>
    <div id="controls">
      <button class="ctl" id="btn-restart" type="button" aria-label="restart round">↻</button>
      <button
        class="ctl"
        id="btn-selfie"
        type="button"
        aria-label="selfie camera"
        aria-pressed="false"
      >
        🤳
      </button>
    </div>
    <div id="banner">
      <div id="banner-title"></div>
      <div id="banner-sub"></div>
    </div>
    <div id="webcam" title="show / hide camera">
      <video id="webcam-video" playsinline></video>
      <canvas id="webcam-overlay"></canvas>
      <div id="webcam-status">starting camera…</div>
      <div id="webcam-cue">📷</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
