<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <!-- Empty data-URI icon: suppresses the browser's automatic /favicon.ico 404. -->
    <link rel="icon" href="data:," />
    <title>Tetris</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a1a;
        color: #eef2ff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      #game canvas {
        display: block;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        padding: 14px;
        display: flex;
        flex-direction: column;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .pill {
        background: rgba(12, 12, 14, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 7px 12px;
        border-radius: 10px;
        font:
          13px/1.3 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
      }
      #best {
        text-align: right;
      }
      #controls {
        align-self: center;
        margin-top: auto;
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }

      #banner {
        position: fixed;
        top: 36%;
        left: 0;
        right: 0;
        text-align: center;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }
      #banner-title {
        font:
          800 clamp(34px, 7vw, 72px)/1.1 system-ui,
          sans-serif;
        color: #fff;
        text-shadow:
          0 4px 0 rgba(0, 0, 0, 0.35),
          0 0 28px rgba(255, 255, 255, 0.35);
      }
      #banner-sub {
        margin-top: 10px;
        font:
          15px/1.4 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: rgba(238, 242, 255, 0.85);
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
      }

      /* Webcam pose panel — legacy layout: fixed bottom-right, 384x288,
         rounded, faint dark backdrop. Video scales to fit; the overlay
         canvas (skeleton + dashed guide boxes) stretches over it. */
      #camera-panel {
        position: fixed;
        right: 4px;
        bottom: 4px;
        width: 384px;
        height: 288px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.1);
        z-index: 10;
      }
      #camera-panel video {
        display: block;
        max-width: 100%;
        height: auto;
        border-radius: 8px;
      }
      #camera-panel canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #camera-status {
        position: absolute;
        left: 8px;
        bottom: 8px;
        padding: 5px 9px;
        border-radius: 8px;
        background: rgba(12, 12, 14, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font:
          11px/1.3 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #eef2ff;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div class="row">
        <div class="pill" id="stats">SCORE 0</div>
        <div class="pill" id="best">BEST 0</div>
      </div>
      <div class="pill" id="controls">
        ←/→ move · ↑ rotate · ↓ soft drop · SPACE hard drop · 1–7 pick next · P pause · R restart ·
        webcam: nose steers · strike a pose = pick next · turn sideways = rotate
      </div>
    </div>
    <div id="banner">
      <div id="banner-title"></div>
      <div id="banner-sub"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
