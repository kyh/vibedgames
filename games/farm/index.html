<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E%F0%9F%8C%BE%3C/text%3E%3C/svg%3E"
    />
    <title>Farm</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #1c2030;
        color: #f4ecd6;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
        image-rendering: pixelated;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      #game canvas {
        display: block;
        image-rendering: pixelated;
      }

      #veil {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        text-align: center;
        background: radial-gradient(circle at 50% 35%, #7ec850 0%, #4a9d3f 45%, #2f6b3a 100%);
        transition: opacity 0.6s ease;
      }
      #veil.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #veil h1 {
        margin: 0;
        font-size: clamp(34px, 8vw, 78px);
        font-weight: 900;
        letter-spacing: 2px;
        color: #fff6d5;
        text-shadow:
          0 3px 0 #b5762e,
          0 6px 18px rgba(0, 0, 0, 0.35);
      }
      #veil .sub {
        color: #f0ffd8;
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0.85;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.25);
        border-top-color: #fff6d5;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="veil">
      <h1>Farm</h1>
      <div class="sub">Loading the farm…</div>
      <div class="spinner"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
