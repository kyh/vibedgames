<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Flappy Dragons</title>
    <meta name="description" content="Flap your dragon through the towers. One tap to fly, one mistake to fall." />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #c6ecff;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      #game canvas {
        display: block;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        padding: 14px calc(14px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
      }
      .pill {
        background: rgba(10, 12, 28, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.22);
        padding: 7px 12px;
        border-radius: 10px;
        font:
          13px/1.3 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #eef2ff;
        letter-spacing: 1px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
      }
      .pill:empty {
        display: none;
      }
      #best {
        margin-bottom: 10px;
        font-size: 16px;
      }
      #hint {
        margin-bottom: 18px;
      }
      /* Live race leaderboard (multiplayer only) — top-left, above the action. */
      #board {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        left: calc(12px + env(safe-area-inset-left));
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font:
          12px/1.25 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #eef2ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        letter-spacing: 1px;
      }
      #board .row {
        display: flex;
        gap: 8px;
        align-items: baseline;
        background: rgba(10, 12, 28, 0.5);
        border-radius: 8px;
        padding: 3px 9px;
      }
      #board .row.me {
        outline: 1px solid rgba(255, 255, 255, 0.5);
      }
      #board .row.dead {
        opacity: 0.45;
      }
      #board .sc {
        margin-left: auto;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      #netinfo {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        right: calc(12px + env(safe-area-inset-right));
        pointer-events: none;
        font:
          11px/1.2 ui-monospace,
          Menlo,
          monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #eef2ff;
        opacity: 0.6;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      /* Mute toggle — tap it, or press M. Sits under netinfo; padding keeps a
         >=44px touch target while the text stays small. */
      #sound {
        position: fixed;
        top: calc(26px + env(safe-area-inset-top));
        right: calc(2px + env(safe-area-inset-right));
        min-width: 44px;
        min-height: 44px;
        padding: 4px 10px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        cursor: pointer;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        font:
          11px/1.2 ui-monospace,
          Menlo,
          monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #eef2ff;
        opacity: 0.6;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      #start {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
        background: rgba(88, 181, 224, 0.76);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        transition: opacity 0.28s ease;
      }
      #start.hide {
        opacity: 0;
        pointer-events: none;
      }
      #start h1 {
        margin: 0;
        font:
          900 clamp(36px, 8vw, 82px) / 0.95 system-ui,
          sans-serif;
        color: #fff6d6;
        letter-spacing: 2px;
        text-shadow:
          0 4px 0 rgba(91, 74, 138, 0.45),
          0 0 28px rgba(255, 255, 255, 0.45);
      }
      #start-controls {
        max-width: 34ch;
        white-space: pre-line;
        font:
          700 14px/1.9 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #20305c;
      }
      #start-go {
        font:
          800 13px/1 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #fff6d6;
        letter-spacing: 1px;
        animation: start-pulse 1.6s ease-in-out infinite;
      }
      @keyframes start-pulse {
        50% {
          opacity: 0.38;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #start-go {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="board"></div>
    <div id="netinfo"></div>
    <div id="sound" aria-label="toggle sound"></div>
    <div id="hud">
      <div class="pill" id="best"></div>
      <div class="pill" id="hint"></div>
    </div>
    <div id="start">
      <h1>FLAPPY DRAGONS</h1>
      <div id="start-controls"></div>
      <div id="start-go"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
