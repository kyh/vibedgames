<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Flappy Dragons</title>
    <meta
      name="description"
      content="Flap your dragon through the towers. One tap to fly, one mistake to fall."
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #c6ecff;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      #game canvas {
        display: block;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        padding: 14px calc(14px + env(safe-area-inset-right))
          calc(14px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
      }
      .pill {
        background: rgba(10, 12, 28, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.22);
        padding: 7px 12px;
        border-radius: 10px;
        font:
          13px/1.3 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #eef2ff;
        letter-spacing: 1px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
      }
      .pill:empty {
        display: none;
      }
      #best {
        margin-bottom: 10px;
        font-size: 16px;
      }
      #hint {
        margin-bottom: 18px;
      }
      /* Live race leaderboard (multiplayer only) — top-left, above the action. */
      #board {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        left: calc(12px + env(safe-area-inset-left));
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font:
          12px/1.25 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #eef2ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        letter-spacing: 1px;
      }
      #board .row {
        display: flex;
        gap: 8px;
        align-items: baseline;
        background: rgba(10, 12, 28, 0.5);
        border-radius: 8px;
        padding: 3px 9px;
      }
      #board .row.me {
        outline: 1px solid rgba(255, 255, 255, 0.5);
      }
      #board .row.dead {
        opacity: 0.45;
      }
      #board .sc {
        margin-left: auto;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      #netinfo {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        right: calc(12px + env(safe-area-inset-right));
        pointer-events: none;
        font:
          11px/1.2 ui-monospace,
          Menlo,
          monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #eef2ff;
        opacity: 0.6;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      /* Thin, translucent wash — the live sky (parallax clouds + hovering
         dragons) keeps reading through it. Text legibility comes from the
         cream halo on #start-card, not from hiding the world. */
      #start {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          rgba(150, 214, 240, 0.32) 0%,
          rgba(104, 186, 226, 0.4) 55%,
          rgba(78, 158, 206, 0.5) 100%
        );
        backdrop-filter: blur(2px) saturate(1.1);
        -webkit-backdrop-filter: blur(2px) saturate(1.1);
        transition: opacity 0.28s ease;
      }
      #start.hide {
        opacity: 0;
        pointer-events: none;
      }

      /* Soft foreground clouds drifting over the live world behind. */
      #start-clouds {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .cloud {
        position: absolute;
        background: #ffffff;
        border-radius: 60px;
        filter: blur(5px);
        will-change: transform;
      }
      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: inherit;
        border-radius: 50%;
      }
      .cloud::before {
        width: 62%;
        height: 150%;
        top: -60%;
        left: 14%;
      }
      .cloud::after {
        width: 44%;
        height: 120%;
        top: -42%;
        right: 16%;
      }
      .cloud.c1 {
        top: 15%;
        width: 190px;
        height: 52px;
        opacity: 0.5;
        animation: cloud-drift 30s linear infinite;
      }
      .cloud.c2 {
        top: 52%;
        width: 130px;
        height: 38px;
        opacity: 0.32;
        animation: cloud-drift 44s linear infinite 7s;
      }
      .cloud.c3 {
        top: 72%;
        width: 240px;
        height: 66px;
        opacity: 0.22;
        animation: cloud-drift 54s linear infinite 15s;
      }
      @keyframes cloud-drift {
        from {
          transform: translateX(-260px);
        }
        to {
          transform: translateX(calc(100vw + 260px));
        }
      }

      #start-card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      #countdown {
        position: fixed;
        inset: 0;
        z-index: 15;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        font:
          900 clamp(72px, 16vw, 160px) / 1 system-ui,
          sans-serif;
        color: #fff6d6;
        text-shadow:
          0 6px 0 rgba(91, 74, 138, 0.55),
          0 10px 22px rgba(40, 30, 80, 0.35),
          0 0 34px rgba(255, 255, 255, 0.45);
      }
      #countdown.show {
        display: flex;
      }
      #countdown.pop {
        animation: count-pop 0.9s cubic-bezier(0.18, 1.4, 0.4, 1) both;
      }
      @keyframes count-pop {
        from {
          opacity: 0;
          transform: scale(1.7);
        }
        30% {
          opacity: 1;
          transform: scale(1);
        }
        85% {
          opacity: 1;
        }
        to {
          opacity: 0.35;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #countdown.pop {
          animation: none;
        }
      }

      #start-title {
        margin: 0;
        animation: title-float 3.6s ease-in-out 1.1s infinite;
      }
      #start-title img {
        display: block;
        width: clamp(280px, 56vw, 620px);
        max-width: 86vw;
        filter: drop-shadow(0 6px 14px rgba(40, 30, 80, 0.35));
        animation: title-in 0.7s cubic-bezier(0.18, 1.4, 0.4, 1) both;
      }
      @keyframes title-in {
        from {
          opacity: 0;
          transform: translateY(46px) scale(0.6) rotate(-4deg);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes title-float {
        50% {
          transform: translateY(-10px);
        }
      }

      #start-controls {
        max-width: 34ch;
        white-space: pre-line;
        font:
          700 14px/1.9 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #1a2a52;
        text-shadow:
          0 1px 0 rgba(255, 251, 234, 0.75),
          0 0 12px rgba(255, 251, 234, 0.55);
      }
      #start-go {
        font:
          800 13px/1 ui-monospace,
          "SF Mono",
          Menlo,
          monospace;
        color: #d9642a;
        text-shadow: 0 1px 0 rgba(255, 251, 234, 0.7);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        animation: start-pulse 1.5s ease-in-out infinite;
      }
      @keyframes start-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.96);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #start-title,
        #start-title img,
        #start-go {
          animation: none;
        }
        #start-clouds {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="board"></div>
    <div id="netinfo"></div>
    <div id="hud">
      <div class="pill" id="best"></div>
      <div class="pill" id="hint"></div>
    </div>
    <div id="start">
      <div id="start-clouds" aria-hidden="true">
        <span class="cloud c1"></span>
        <span class="cloud c2"></span>
        <span class="cloud c3"></span>
      </div>
      <div id="start-card">
        <h1 id="start-title">
          <img src="/title.webp" alt="Flappy Dragons" />
        </h1>
        <div id="start-controls"></div>
        <div id="start-go"></div>
      </div>
    </div>
    <div id="countdown" aria-live="polite"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
