<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Player dart hull (SHIP_HULL_DEG [0,140,180,220], notched tail) nose-up,
       player-family cyan/white per art direction. Strokes layered for glow. -->
  <rect width="64" height="64" fill="#020617"/>
  <g fill="#ffffff">
    <circle cx="9" cy="12" r="1" opacity="0.7"/>
    <circle cx="54" cy="9" r="1.3" opacity="0.9"/>
    <circle cx="58" cy="38" r="1" opacity="0.5"/>
    <circle cx="7" cy="49" r="1" opacity="0.6"/>
    <circle cx="47" cy="57" r="0.8" opacity="0.5"/>
    <circle cx="20" cy="6" r="0.8" opacity="0.5"/>
  </g>
  <!-- thruster flame off the tail notch -->
  <path d="M32 47 L32 58" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.28"/>
  <path d="M32 47 L32 56" stroke="#67e8f9" stroke-width="2.6" stroke-linecap="round" opacity="0.9"/>
  <!-- hull: nose (32,12.4), wings (±13.9, 50.5), tail notch (32,44.8) -->
  <g fill="none" stroke-linejoin="round">
    <path d="M32 12.4 L45.9 50.5 L32 44.8 L18.1 50.5 Z" stroke="#22d3ee" stroke-width="7" opacity="0.3"/>
    <path d="M32 12.4 L45.9 50.5 L32 44.8 L18.1 50.5 Z" stroke="#7dd3fc" stroke-width="3.6" opacity="0.85"/>
    <path d="M32 12.4 L45.9 50.5 L32 44.8 L18.1 50.5 Z" stroke="#ffffff" stroke-width="1.6"/>
  </g>
  <circle cx="32" cy="31" r="2.6" fill="#e0f2fe" opacity="0.95"/>
</svg>
