<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Starfall</title>
    <meta name="description" content="Online multiplayer arena shooter. Drop in, level up, blast your friends among the stars." />
    <link rel="canonical" href="https://starfall.vibedgames.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="vibedgames" />
    <meta property="og:title" content="Starfall" />
    <meta property="og:description" content="Online multiplayer arena shooter. Drop in, level up, blast your friends among the stars." />
    <meta property="og:url" content="https://starfall.vibedgames.com/" />
    <meta property="og:image" content="https://starfall.vibedgames.com/og.jpg" />
    <meta property="og:image:width" content="1536" />
    <meta property="og:image:height" content="864" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://starfall.vibedgames.com/og.jpg" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #020617 url("bg.png") repeat;
        background-size: 10px 10px;
        color: #fff;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
        cursor: crosshair;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      #game canvas {
        display: block;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      #weapon {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.6;
      }
      #weaponbar {
        height: 2px;
        width: 0%;
        margin-top: 3px;
        background: #fff;
        transition: width 100ms linear;
      }
      #shield {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.8;
        margin-top: 4px;
        display: none;
      }
      #shieldrow {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #shieldtrack {
        position: relative;
        width: 70px;
        height: 3px;
        display: inline-block;
      }
      #shieldfill {
        position: absolute;
        left: 0;
        top: 0;
        height: 3px;
        width: 40px;
        background: #fff;
        transition: width 100ms linear;
      }
      #shieldos {
        position: absolute;
        left: 41px;
        top: 0;
        height: 3px;
        width: 0;
        background: #7dd3fc;
        transition: width 100ms linear;
      }
      /* low shield (<30): 6Hz blink */
      #shield.low #shieldfill {
        animation: shield-blink 167ms steps(1) infinite;
      }
      @keyframes shield-blink {
        50% {
          opacity: 0.25;
        }
      }
      #shieldmod {
        margin-top: 3px;
        display: none;
      }
      #shieldmodbar {
        height: 2px;
        width: 0%;
        margin-top: 2px;
        transition: width 100ms linear;
      }
      #boosts {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 4px;
        opacity: 0.85;
        font-variant-numeric: tabular-nums;
      }
      #players {
        font-size: 11px;
        opacity: 0.5;
      }

      #bossbar {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        width: 44vw;
        max-width: 720px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #bossbar .track {
        height: 8px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 45, 45, 0.5);
      }
      #bosshp {
        height: 100%;
        width: 100%;
        background: #ff2d2d;
        box-shadow: 0 0 10px #ff2d2d;
        transition: width 120ms linear;
      }
      #combo {
        position: fixed;
        top: 48px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        padding: 4px 14px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        opacity: 0;
        transition: opacity 0.2s ease;
        text-align: center;
      }
      #comboval {
        font-size: 14px;
        font-weight: 200;
        letter-spacing: 1px;
        font-variant-numeric: tabular-nums;
      }
      #combobar {
        height: 2px;
        width: 100%;
        margin-top: 3px;
        background: rgba(255, 255, 255, 0.8);
        transition: width 100ms linear;
      }
      #combo.pop {
        animation: combo-pop 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes combo-pop {
        0% {
          transform: translateX(-50%) scale(1);
        }
        50% {
          transform: translateX(-50%) scale(1.15);
        }
        100% {
          transform: translateX(-50%) scale(1);
        }
      }

      #attract {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        padding: 6px 18px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.7;
        transition: opacity 0.4s ease;
      }

      #overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      #destroyed {
        font-size: 32px;
        font-weight: 200;
        letter-spacing: 8px;
        opacity: 0.8;
      }
      #cause {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 3px;
        opacity: 0.7;
      }
      #hint {
        font-size: 12px;
        opacity: 0.55;
        font-style: italic;
      }
      #countdown {
        font-size: 14px;
        opacity: 0.7;
        font-variant-numeric: tabular-nums;
      }
      #mute {
        position: fixed;
        right: 20px;
        bottom: 16px;
        pointer-events: none;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div>
        <div id="weapon">NORMAL BEAM</div>
        <div id="weaponbar"></div>
        <div id="shield">
          <div id="shieldrow">
            <span>shield</span>
            <span id="shieldtrack"><span id="shieldfill"></span><span id="shieldos"></span></span>
          </div>
          <div id="shieldmod"></div>
          <div id="shieldmodbar"></div>
        </div>
        <div id="boosts"></div>
      </div>
      <div id="players">connecting&hellip;</div>
    </div>
    <div id="bossbar">
      <div class="track"><div id="bosshp"></div></div>
    </div>
    <div id="combo">
      <div id="comboval">&times;2 &middot; 3</div>
      <div id="combobar"></div>
    </div>
    <div id="attract">Mouse to move. Click to shoot</div>
    <div id="mute"></div>
    <div id="overlay">
      <div id="destroyed">DESTROYED</div>
      <div id="cause"></div>
      <div id="hint"></div>
      <div id="countdown"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
