<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Astroid</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #020617 url("bg.png") repeat;
        background-size: 10px 10px;
        color: #fff;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
        cursor: crosshair;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      #game canvas {
        display: block;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      #score {
        font-size: 24px;
        font-weight: 200;
        font-variant-numeric: tabular-nums;
        letter-spacing: 2px;
      }
      #weapon {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.6;
      }
      #weaponbar {
        height: 2px;
        width: 0%;
        margin-top: 3px;
        background: #fff;
        transition: width 100ms linear;
      }
      #shield {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.8;
        margin-top: 4px;
        display: none;
      }
      #players {
        font-size: 11px;
        opacity: 0.5;
      }

      #combo {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        padding: 4px 14px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        opacity: 0;
        transition: opacity 0.2s ease;
        text-align: center;
      }
      #comboval {
        font-size: 14px;
        font-weight: 200;
        letter-spacing: 1px;
        font-variant-numeric: tabular-nums;
      }
      #combobar {
        height: 2px;
        width: 100%;
        margin-top: 3px;
        background: rgba(255, 255, 255, 0.8);
        transition: width 100ms linear;
      }
      #combo.pop {
        animation: combo-pop 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes combo-pop {
        0% {
          transform: translateX(-50%) scale(1);
        }
        50% {
          transform: translateX(-50%) scale(1.15);
        }
        100% {
          transform: translateX(-50%) scale(1);
        }
      }

      #attract {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        padding: 4px 14px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.6;
        transition: opacity 0.4s ease;
      }

      #overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      #destroyed {
        font-size: 32px;
        font-weight: 200;
        letter-spacing: 8px;
        opacity: 0.8;
      }
      #cause {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 3px;
        opacity: 0.7;
      }
      #hint {
        font-size: 12px;
        opacity: 0.55;
        font-style: italic;
      }
      #replay {
        font-size: 12px;
        opacity: 0.6;
        font-variant-numeric: tabular-nums;
        letter-spacing: 1px;
      }
      #countdown {
        font-size: 14px;
        opacity: 0.7;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div>
        <div id="score">0</div>
        <div id="weapon">NORMAL BEAM</div>
        <div id="weaponbar"></div>
        <div id="shield"></div>
      </div>
      <div id="players">connecting&hellip;</div>
    </div>
    <div id="combo">
      <div id="comboval">&times;2 &middot; 3</div>
      <div id="combobar"></div>
    </div>
    <div id="attract">move &middot; mouse &mdash; fire &middot; hold</div>
    <div id="overlay">
      <div id="destroyed">DESTROYED</div>
      <div id="cause"></div>
      <div id="hint"></div>
      <div id="replay"></div>
      <div id="countdown"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
