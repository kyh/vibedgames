<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <title>Pong</title>
    <meta name="description" content="Classic pong reborn in dithered 3D. First to 11 takes it." />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #d4d4d4;
        color: #000;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }
      #game {
        position: fixed;
        inset: 0;
        touch-action: none;
      }
      #game canvas {
        display: block;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: calc(18px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right))
          calc(18px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
      }
      #score {
        font-size: 17px;
        letter-spacing: 2px;
        font-variant-numeric: tabular-nums;
      }
      #score span {
        display: inline-block;
        min-width: 1.2em;
        text-align: center;
        font-weight: 700;
      }
      #score span.pop {
        animation: pop 280ms cubic-bezier(0.22, 1.4, 0.4, 1);
      }
      #netinfo,
      #sound {
        margin-top: 6px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.55;
      }
      /* Tappable mute toggle (phones have no M key). Padding + negative
         margins grow the hit target past 44px without moving the label. */
      #sound {
        pointer-events: auto;
        cursor: pointer;
        padding: 16px 18px;
        margin: -14px -18px -16px;
      }
      @keyframes pop {
        0% {
          transform: scale(1.7);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Rally combo — DOM above the canvas (crisp ink, un-dithered). Size grows
         with the rally via --combo-tier (0→1, set per hit in game-scene). */
      #combo {
        position: fixed;
        top: 27%;
        left: 0;
        right: 0;
        text-align: center;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        font-size: calc(28px + var(--combo-tier, 0) * 44px);
        letter-spacing: 2px;
        opacity: 0;
        transition: opacity 0.18s ease;
        pointer-events: none;
      }
      #combo.pop {
        animation: combopop 220ms cubic-bezier(0.22, 1.4, 0.4, 1);
      }
      @keyframes combopop {
        0% {
          transform: scale(1.55);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Serve countdown — drains over the auto-serve dead air (--fill 100%→0). */
      #serve-meter {
        position: fixed;
        bottom: calc(3.5% + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        width: 140px;
        height: 3px;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      }
      #serve-meter.on {
        opacity: 0.85;
      }
      #serve-meter::after {
        content: "";
        display: block;
        height: 100%;
        width: var(--fill, 100%);
        margin: 0 auto;
        background: #000;
      }

      #prompt {
        position: fixed;
        bottom: calc(3.5% + env(safe-area-inset-bottom));
        left: 0;
        right: 0;
        text-align: center;
        font-size: 14px;
        letter-spacing: 3px;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }

      #banner {
        position: fixed;
        top: 36%;
        left: 0;
        right: 0;
        text-align: center;
        font-weight: 800;
        font-size: clamp(34px, 7vw, 72px);
        line-height: 1;
        letter-spacing: 4px;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }
      #banner small {
        display: block;
        margin-top: 14px;
        font-weight: 400;
        font-size: 14px;
        letter-spacing: 3px;
      }

      /* Webcam hand-tracking panel — the project's core gimmick, framed to feel
         intentional: ink border + hard offset shadow, an inverted label bar, and
         a grayscale feed so it sits in the ink-on-paper palette (the green/red
         hand skeleton on the canvas stays colored as the one live-data accent). */
      #camera-panel {
        position: fixed;
        right: calc(14px + env(safe-area-inset-right));
        bottom: calc(14px + env(safe-area-inset-bottom));
        /* Clamped for phones: 224px would swallow 57% of a 390px screen. */
        width: min(224px, 34vw);
        aspect-ratio: 4 / 3;
        background: #d4d4d4;
        border: 2px solid #000;
        box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.85);
        overflow: hidden;
        cursor: pointer;
      }
      /* Narrow (portrait phone): sit above the #prompt / #serve-meter zone. */
      @media (max-width: 480px) {
        #camera-panel {
          bottom: calc(64px + env(safe-area-inset-bottom));
        }
      }
      /* Tap-minimized: the panel collapses to a "HAND CONTROL" pill (the
         ::before label becomes the whole control); tracking keeps running. */
      #camera-panel[data-min="1"] {
        width: auto;
        aspect-ratio: auto;
        height: 44px; /* comfortable touch target */
        display: flex;
        align-items: center;
        padding: 0 14px;
        background: #000;
      }
      #camera-panel[data-min="1"]::before {
        position: static;
        padding: 0;
        background: none;
      }
      #camera-panel[data-min="1"] video,
      #camera-panel[data-min="1"] canvas,
      #camera-panel[data-min="1"] #camera-status {
        display: none;
      }
      #camera-panel::before {
        content: "HAND CONTROL";
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        background: #000;
        color: #d4d4d4;
        font-size: 10px;
        letter-spacing: 2px;
        padding: 3px 7px;
        pointer-events: none;
      }
      #camera-panel video {
        object-fit: fill; /* fill (not cover) so the whole frame shows and stays aligned with the skeleton canvas */
        display: block;
        width: 100%;
        height: 100%;
        filter: grayscale(1) contrast(1.15);
        transform: scaleX(-1); /* selfie-mirror to match the mirrored paddle mapping */
      }
      #camera-panel canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
      }
      /* Hide the feed until it's live so init/error states read as a clean panel. */
      #camera-panel[data-state="init"] video,
      #camera-panel[data-state="error"] video {
        display: none;
      }
      #camera-status {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        text-align: center;
        font-size: 11px;
        letter-spacing: 1px;
        color: #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div id="score">
        You <span id="score-you">0</span> — <span id="score-ai">0</span>
        <span id="opp-label">AI</span>
      </div>
      <div id="netinfo"></div>
      <div id="sound"></div>
    </div>
    <div id="combo"></div>
    <div id="serve-meter"></div>
    <div id="prompt">press space or tap to serve</div>
    <div id="banner"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
