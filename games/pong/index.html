<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:," />
    <title>Pong</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #d4d4d4;
        color: #000;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }
      #game {
        position: fixed;
        inset: 0;
        touch-action: none;
      }
      #game canvas {
        display: block;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 18px;
      }
      #score {
        font-size: 17px;
        letter-spacing: 2px;
      }
      #score span {
        display: inline-block;
        min-width: 1.2em;
        text-align: center;
      }
      #score span.pop {
        animation: pop 280ms ease-out;
      }
      @keyframes pop {
        0% {
          transform: scale(1.7);
        }
        100% {
          transform: scale(1);
        }
      }

      #prompt {
        position: fixed;
        bottom: 16%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 14px;
        letter-spacing: 3px;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }

      #banner {
        position: fixed;
        top: 36%;
        left: 0;
        right: 0;
        text-align: center;
        font-weight: 800;
        font-size: clamp(34px, 7vw, 72px);
        line-height: 1;
        letter-spacing: 4px;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }
      #banner small {
        display: block;
        margin-top: 14px;
        font-weight: 400;
        font-size: 14px;
        letter-spacing: 3px;
      }

      /* webcam hand-tracking panel (legacy: 384×288 rounded, bottom-right) */
      #camera-panel {
        position: fixed;
        right: 4px;
        bottom: 4px;
        width: 384px;
        height: 288px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.1);
      }
      #camera-panel video {
        object-fit: fill;
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 8px;
      }
      #camera-panel canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #camera-status {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        text-align: center;
        font-size: 12px;
        letter-spacing: 1px;
        color: #333;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div id="score">You <span id="score-you">0</span> — <span id="score-ai">0</span> AI</div>
    </div>
    <div id="prompt">press space or tap to serve</div>
    <div id="banner"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
