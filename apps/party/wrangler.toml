name = "vg-partyserver"
main = "src/server.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "VgServer"
class_name = "VgServer"

[[migrations]]
tag = "v1"
new_classes = ["VgServer"]

# Cloudflare D1 — same database used by the web app.
# Create with:  pnpm wrangler d1 create vibedgames
# then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "vibedgames"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
